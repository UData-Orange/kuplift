name: Tests python package

on: [workflow_call]

jobs:
  build:

    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
    - uses: actions/checkout@v6

    - uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install Khiops executable
      run: |
        sudo apt-get update -y && sudo apt-get install wget -y && \
        source /etc/os-release && \
        ARCH=$(dpkg --print-architecture) && \
        TEMP_DEB="$(mktemp)" && \
        wget -O "$TEMP_DEB" "https://github.com/KhiopsML/khiops/releases/download/11.0.0/khiops-core-openmpi_11.0.0-1-${VERSION_CODENAME}.${ARCH}.deb" && \
        sudo dpkg -i "$TEMP_DEB" || sudo apt-get -f -y install && \
        rm -f $TEMP_DEB && \
        pip install khiops==11.0.0.3

    - name: Install dependencies
      run: python -m pip install .[test]
      
    - name: Test with pytest
      run: python -m pytest
